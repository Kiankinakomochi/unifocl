name: CI And Release

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to republish (e.g. 2.3.1) — skips binary build and GitHub Release creation'
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Build
        run: dotnet build src/unifocl/unifocl.csproj --disable-build-servers -v minimal

  release:
    name: Release (Main)
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      skip: ${{ steps.version.outputs.skip }}
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            semver="${{ inputs.version }}"
            tag="v${semver}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "skip_reason=none" >> "$GITHUB_OUTPUT"
            echo "version=$semver" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          version_file="src/unifocl/Services/CliVersion.cs"
          major="$(sed -n 's/.*Major = \([0-9]\+\);/\1/p' "$version_file" | head -n1)"
          minor="$(sed -n 's/.*Minor = \([0-9]\+\);/\1/p' "$version_file" | head -n1)"
          patch="$(sed -n 's/.*Patch = \([0-9]\+\);/\1/p' "$version_file" | head -n1)"
          devcycle="$(sed -n 's/.*DevCycle = \"\(.*\)\";/\1/p' "$version_file" | head -n1)"

          if [[ -z "$major" || -z "$minor" || -z "$patch" ]]; then
            echo "failed to resolve version from $version_file"
            exit 1
          fi

          semver="${major}.${minor}.${patch}${devcycle}"
          tag="v${semver}"

          if [[ -n "$devcycle" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=devcycle-present" >> "$GITHUB_OUTPUT"
            echo "version=$semver" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "skip_reason=tag-exists" >> "$GITHUB_OUTPUT"
            echo "version=$semver" >> "$GITHUB_OUTPUT"
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "skip_reason=none" >> "$GITHUB_OUTPUT"
          echo "version=$semver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Skip release notice
        if: steps.version.outputs.skip == 'true'
        run: |
          echo "release skipped: ${{ steps.version.outputs.skip_reason }}"
          echo "version: ${{ steps.version.outputs.version }}"
          echo "tag: ${{ steps.version.outputs.tag }}"

      - name: Publish binaries
        if: steps.version.outputs.skip == 'false' && github.event_name != 'workflow_dispatch'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          dist=".artifacts/v${version}/dist"
          mkdir -p "$dist" ".artifacts/v${version}/macos-arm64" ".artifacts/v${version}/win-x64"

          dotnet publish src/unifocl/unifocl.csproj \
            -c Release \
            -r osx-arm64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=false \
            --disable-build-servers -v minimal \
            -o ".artifacts/v${version}/macos-arm64"

          dotnet publish src/unifocl/unifocl.csproj \
            -c Release \
            -r win-x64 \
            --self-contained true \
            /p:PublishSingleFile=true \
            /p:PublishTrimmed=false \
            --disable-build-servers -v minimal \
            -o ".artifacts/v${version}/win-x64"

          tar -C ".artifacts/v${version}/macos-arm64" -czf "$dist/unifocl-${version}-macos-arm64.tar.gz" .
          (cd ".artifacts/v${version}/win-x64" && zip -qr "../../v${version}/dist/unifocl-${version}-win-x64.zip" .)
          git archive --format=tar.gz --output "$dist/unifocl-${version}.tar.gz" HEAD

      - name: Build release notes
        if: steps.version.outputs.skip == 'false' && github.event_name != 'workflow_dispatch'
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          notes_file=".artifacts/v${version}/release-notes.md"
          mkdir -p ".artifacts/v${version}"

          if [[ -f CHANGELOG.md ]]; then
            awk -v v="$version" '
              BEGIN { capture=0 }
              $0 ~ "^## " v "([[:space:]]|$)" { capture=1; print; next }
              $0 ~ "^## " && capture==1 { exit }
              capture==1 { print }
            ' CHANGELOG.md > "$notes_file"
          fi

          if [[ ! -s "$notes_file" ]]; then
            {
              echo "## ${version}"
              echo
              echo "Automated release from \`main\`."
            } > "$notes_file"
          fi

          echo "file=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.version.outputs.skip == 'false' && github.event_name != 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.notes.outputs.file }}
          files: |
            .artifacts/v${{ steps.version.outputs.version }}/dist/unifocl-${{ steps.version.outputs.version }}-macos-arm64.tar.gz
            .artifacts/v${{ steps.version.outputs.version }}/dist/unifocl-${{ steps.version.outputs.version }}-win-x64.zip
            .artifacts/v${{ steps.version.outputs.version }}/dist/unifocl-${{ steps.version.outputs.version }}.tar.gz
            scripts/install.sh
            scripts/install.ps1

  # Requires manual approval via the "publish" environment protection rule.
  # GitHub will pause here and notify required reviewers — approve to proceed
  # with the PAT-authenticated pushes below.
  publish:
    name: Publish to Registries
    needs: release
    if: needs.release.outputs.skip == 'false'
    runs-on: ubuntu-latest
    environment: publish
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Update Homebrew Formula Tap
        shell: bash
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          if [[ -z "${HOMEBREW_TAP_TOKEN:-}" ]]; then
            echo "HOMEBREW_TAP_TOKEN is not set; skipping homebrew formula update."
            exit 0
          fi

          version="${{ needs.release.outputs.version }}"
          tag="${{ needs.release.outputs.tag }}"
          release_asset_url="https://github.com/Kiankinakomochi/unifocl/releases/download/${tag}/unifocl-${version}-macos-arm64.tar.gz"
          archive_path="/tmp/unifocl-${version}-macos-arm64.tar.gz"
          formula_repo_dir="$(mktemp -d)"
          formula_path="${formula_repo_dir}/Formula/unifocl.rb"

          curl -fsSL "${release_asset_url}" -o "${archive_path}"
          asset_sha256="$(sha256sum "${archive_path}" | awk '{print $1}')"

          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Kiankinakomochi/homebrew-unifocl.git" "${formula_repo_dir}"

          if [[ ! -f "${formula_path}" ]]; then
            echo "Formula file not found at ${formula_path}"
            exit 1
          fi

          sed -i -E "s|^  url \".*\"$|  url \"${release_asset_url}\"|" "${formula_path}"
          sed -i -E "s|^  sha256 \".*\"$|  sha256 \"${asset_sha256}\"|" "${formula_path}"
          if grep -Eq "^  version \".*\"$" "${formula_path}"; then
            sed -i -E "s|^  version \".*\"$|  version \"${version}\"|" "${formula_path}"
          else
            awk -v v="${version}" '
              BEGIN { inserted=0 }
              {
                print
                if (!inserted && $0 ~ /^  homepage "/) {
                  print "  version \"" v "\""
                  inserted=1
                }
              }
            ' "${formula_path}" > "${formula_path}.tmp"
            mv "${formula_path}.tmp" "${formula_path}"
          fi

          if git -C "${formula_repo_dir}" diff --quiet -- Formula/unifocl.rb; then
            echo "No formula changes detected; skipping commit."
            exit 0
          fi

          git -C "${formula_repo_dir}" config user.name "github-actions[bot]"
          git -C "${formula_repo_dir}" config user.email "github-actions[bot]@users.noreply.github.com"
          git -C "${formula_repo_dir}" add Formula/unifocl.rb
          git -C "${formula_repo_dir}" commit -m "unifocl ${version}"
          git -C "${formula_repo_dir}" push origin HEAD:main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm plugin
        working-directory: src/unifocl.claude-plugin
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          version="${{ needs.release.outputs.version }}"
          VERSION="$version" node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.env.VERSION;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          npm publish --access public

  winget:
    name: Publish to WinGet
    needs: release
    if: needs.release.outputs.skip == 'false' && github.event_name == 'workflow_dispatch'
    runs-on: windows-latest
    environment: publish
    permissions:
      contents: read
    steps:
      - name: Publish to WinGet
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          if (-not $env:WINGET_TOKEN) {
            Write-Host "WINGET_TOKEN is not set; skipping winget publish."
            exit 0
          }

          $version = "${{ needs.release.outputs.version }}"
          $tag = "${{ needs.release.outputs.tag }}"
          $installerUrl = "https://github.com/Kiankinakomochi/unifocl/releases/download/$tag/unifocl-$version-win-x64.zip"

          $wingetcreate = "$env:TEMP\wingetcreate.exe"
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile $wingetcreate

          & $wingetcreate update KinichiAnjuMakino.unifocl `
            --version $version `
            --urls $installerUrl `
            --token $env:WINGET_TOKEN `
            --submit
